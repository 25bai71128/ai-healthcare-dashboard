<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MediAI{% endblock %} - Intelligent Health Insights</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="particles" aria-hidden="true"></div>

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="logo-icon" aria-hidden="true">M</span>
      <span class="logo-text">MediAI</span>
    </a>

    <span class="navbar-tagline">Clinical decision support for screening</span>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/#predict-tools">Predict</a>
      <a href="/#about">About</a>
      <a href="/disclaimer">Disclaimer</a>
    </div>
  </nav>

  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <div class="loading-overlay" id="loading-overlay" role="status" aria-live="polite" aria-hidden="true">
    <div class="loader-ring"></div>
    <span class="loader-text">Analyzing your data<span class="loader-dots"></span></span>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
