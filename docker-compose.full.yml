version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Inside the compose network, the Flask service is reachable by its service name.
      - AI_PYTHON_SERVICE_URL=http://app:8000
    depends_on:
      - postgres
      - app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_healthcare
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

